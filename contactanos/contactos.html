<h1>CONTÁCTANOS</h1>

<p>
¿Quieres ponerte en contacto con nosotros?
Contáctanos usando el formulario o revisa las preguntas frecuentes.
</p>

<a href="#faq" class="preguntas">
Ir a las preguntas frecuentes
</a>

</div>

<!-- DERECHA -->
<div class="col-lg-7">

<form>

<div class="row">

<div class="col-md-6 mb-4">
<label>Nombres</label>
<input type="text" class="form-control">
</div>

</div>

</div>

<label>Email</label>
<input type="email" class="form-control" placeholder="example@domain.com">
</div>

<label>Teléfono</label>
<input type="text" class="form-control">
</div>

<div class="mb-4">

</div>

<div class="mb-4">
<label>Mensaje</label>

</div>

<div class="text-center">
<button type="submit" class="enviar">
Enviar
</button>
</div>
